name: Books Library - self-hosted smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: Verify runner reaches Clio and BooksDevPrep
    runs-on: [self-hosted, books-devprep]
    env:
      CoreLibPath: ${{ github.workspace }}\.application\net-framework\core-bin
      TestCoreLibPath: ${{ github.workspace }}\.application\net-framework\core-bin
      RelativePkgFolderPath: ${{ github.workspace }}\.application\net-framework\packages
      CoreTargetFramework: net472
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Show Clio version
        shell: powershell
        run: clio --version

      - name: List Clio environments
        shell: powershell
        run: clio show-web-app-list --format table

      - name: Sonar begin
        shell: powershell
        run: |
          dotnet sonarscanner begin `
            /k:"ytodosan_BooksDevPrep" `
            /o:"ytodosan" `
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" `
            /d:sonar.exclusions="**/Autogenerated/*" `
            /d:sonar.test.exclusions="tests/UsrLibrary/*" `
            /d:sonar.sourceEncoding=UTF-8 `
            /d:sonar.qualitygate.wait=true `
            /d:sonar.qualitygate.timeout=1000

      - name: Run unit tests
        shell: powershell
        run: .\tasks\run-tests.cmd

      - name: Sonar end
        shell: powershell
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

  release:
    name: Publish Library app as a GitHub Release
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, books-devprep]
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Publish Library app artifact
        id: publish
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "$env:RUNNER_TEMP\dist"
          clio publish-app . --app-hub "$dist" -a UsrLibrary -v 1.0.0
          if ($LASTEXITCODE -ne 0) { throw "clio publish-app failed with exit code $LASTEXITCODE" }
          $zip = Join-Path $dist "UsrLibrary_1.0.0.zip"
          if (-not (Test-Path $zip)) { throw "Artifact not found: $zip" }
          "zip=$($zip -replace '\\','/')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ github.run_number }}
          name: Library app 1.0.0 (build ${{ github.run_number }})
          files: ${{ steps.publish.outputs.zip }}
          fail_on_unmatched_files: true
